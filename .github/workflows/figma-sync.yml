name: Figma Token Sync

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:       # Manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync tokens from Figma
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
        run: node scripts/sync-tokens.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet design-tokens/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Create PR with updated tokens
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: sync design tokens from Figma'
          title: '🎨 Figma Token Sync'
          body: |
            ## Automated Figma Token Sync

            This PR was auto-generated by the Figma sync pipeline.

            ### What changed
            - Updated `design-tokens/raw-components.json`
            - Updated `design-tokens/raw-styles.json`
            - Updated `design-tokens/sync-summary.json`

            ### Next steps
            Review the changes and merge if they look correct.
          branch: figma-sync/auto-update
          labels: figma-sync, automated
