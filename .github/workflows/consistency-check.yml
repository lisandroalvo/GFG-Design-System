name: Design System Consistency Check

on:
  pull_request:
    branches: [main]
    paths:
      - 'extracted-components/**'
      - 'design-tokens/**'
      - 'code-connect/**'
      - 'src/**'
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  drift-check:
    runs-on: ubuntu-latest
    name: Figma ↔ React Drift Check

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run drift detection
        id: drift
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
        run: |
          node scripts/check-drift.mjs 2>&1 | tee drift-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Post drift report as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('drift-output.txt', 'utf8');
            const report = JSON.parse(fs.readFileSync('design-tokens/drift-report.json', 'utf8'));

            const statusIcon = report.summary.errorCount > 0 ? '❌' : '✅';
            const body = `## ${statusIcon} Design System Consistency Check

            | Metric | Count |
            |--------|-------|
            | Figma component sets | ${report.summary.figmaComponentSets} |
            | React components | ${report.summary.reactComponents} |
            | Code Connect files | ${report.summary.connectedComponents} |
            | Errors | ${report.summary.errorCount} |
            | Warnings | ${report.summary.warningCount} |

            <details>
            <summary>Full output</summary>

            \`\`\`
            ${output}
            \`\`\`
            </details>

            *Generated by [Figma ↔ React sync pipeline](/.github/workflows/consistency-check.yml)*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Fail if errors found
        if: steps.drift.outputs.exit_code == '1'
        run: exit 1
